services:
  cloudasset-server:
    image: ${CLOUDASSET_SERVER_IMAGE:?Set CLOUDASSET_SERVER_IMAGE}
    container_name: cloudasset-server
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_KEY=${API_KEY:?Please set API_KEY}
      - DB_PATH=/app/data/cloudasset.db
      - STORAGE_ROOT=/app/files
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:?Please set PUBLIC_BASE_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-512}
    volumes:
      - cloudasset-data:/app/data
      - cloudasset-files:/app/files
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudasset-web:
    image: ${CLOUDASSET_WEB_IMAGE:?Set CLOUDASSET_WEB_IMAGE}
    container_name: cloudasset-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      cloudasset-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  cloudasset-data:
  cloudasset-files:
