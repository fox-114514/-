# Nginx 反代示例 · 部署到 https://asset.example.com
# 1. 将本文件复制到 /etc/nginx/sites-available/cloudasset
# 2. ln -s /etc/nginx/sites-available/cloudasset /etc/nginx/sites-enabled/
# 3. certbot --nginx -d asset.example.com

# 限流区
limit_req_zone $binary_remote_addr zone=cloudasset:10m rate=10r/s;

# HTTP -> HTTPS
server {
    listen 80;
    server_name asset.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name asset.example.com;

    ssl_certificate     /etc/letsencrypt/live/asset.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asset.example.com/privkey.pem;

    # 大文件上传
    client_max_body_size 1100M;
    client_body_timeout  300s;
    send_timeout         300s;

    # MCP HTTP 端点 (无 body size 限制)
    location /mcp {
        limit_req zone=cloudasset burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # 静态资源可直接走 nginx
    # location /files/ { internal; root /var/cloudasset; }

    # 其它请求反代到 Node
    location / {
        limit_req zone=cloudasset burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
